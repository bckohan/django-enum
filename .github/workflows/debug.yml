name: Debug

permissions:
    contents: read

on:
  workflow_dispatch:
    inputs:
        python-version:
            description: 'Python Version'
            required: true
            type: choice
            default: '3.13'
            options:
                - '3.9'
                - '3.10'
                - '3.11'
                - '3.12'
                - '3.13'

jobs:

  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Set up Python ${{ github.event.inputs.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        id: sp
        with:
          python-version: ${{ github.event.inputs.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098
        with:
          enable-cache: false
      - name: Install Just
        uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b
      - name: Install Dependencies
        env:
          PYTHON_PATH: ${{ steps.sp.outputs.python-path }}
        run: |
          just setup "$PYTHON_PATH"
      - name: Install Emacs
        run: |
          sudo apt install emacs
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101
        timeout-minutes: 60
